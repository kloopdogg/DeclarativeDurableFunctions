workflow:
  name: Fulfill Line Item V2
  steps:
    - name: FulfillItem
      activity: FulfillLineItemActivity
      input: "{{input}}"
      output: result

    - name: NotifyWarehouse
      activity: SendConfirmationEmailActivity
      input: 
        customerEmail: "warehouse@crow.com"
        subject: "Item fulfilled"
        body: "Item {{input.data.lineItemId}} has been successfully fulfilled."
      output: warehouseNotification
