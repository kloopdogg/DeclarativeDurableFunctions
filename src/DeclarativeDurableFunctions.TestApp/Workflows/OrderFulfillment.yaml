workflow:
  name: Order Fulfillment
  steps:
    - name: ValidateOrder
      activity: ValidateOrderActivity
      input: "{{input}}"
      output: validation
      retry:
        maxAttempts: 3
        firstRetryInterval: PT5S

    - name: FulfillLineItems
      type: foreach
      source: "{{input.lineItems}}"
      workflow: FulfillLineItem
      input:
        parent:
          orchestrationId: "{{orchestration.instanceId}}"
          correlationId: "{{input.correlationId}}"
        data: "{{$item}}"
      instanceId: "{{$item.lineItemId}}"
      output: fulfillmentResults

    - name: WaitForApproval
      type: wait-for-event
      event: ApprovalDecision
      timeout: P7D
      on-timeout: continue
      output: approval

    - name: Finalize
      type: parallel
      output: finalize
      steps:
        - name: HandleResult
          type: switch
          on: "{{approval.decision == 'approved'}}"
          cases:
            "true":
              - name: SendConfirmation
                activity: SendConfirmationEmailActivity
                input: 
                  customerEmail: "{{input.customerEmail}}"
                  subject: "Order Approved"
                  body: "Your order has been approved."
              - name: UpdateLedger
                activity: UpdateLedgerActivity
                input: "{{fulfillmentResults}}"
            "false":
              - name: CraftFailureNotification
                activity: WriteTelegramMessageActivity
                input:
                  data: "{{approval}}"
                  status: "{{approval.decision}}"
                output: createdNotification
              - name: NotifyTeam
                activity: SendTelegramMessageActivity
                input: "{{createdNotification.telegramMessage}}"
                output: teamNotification
